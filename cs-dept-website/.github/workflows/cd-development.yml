# ──────────────────────────────────────────────────────────────
# CD Pipeline — DEVELOPMENT Environment
# Triggers: push to `develop` branch
# Deploys to: Render.com development service
# ──────────────────────────────────────────────────────────────

name: CD — Deploy to Development

on:
  push:
    branches: [develop]

# Use GitHub Environment: development (holds secrets)
environment: development

jobs:
  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (development tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:develop
            ${{ secrets.DOCKER_USERNAME }}/cs-dept-website:develop-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render.com deployment (Development)
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}" \
            -H "Content-Type: application/json" \
            --fail \
            && echo "✅ Render deployment triggered for DEVELOPMENT"

      - name: Wait and verify deployment
        run: |
          echo "Waiting 30s for deployment to initialize..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEV_SITE_URL }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Development site is live: ${{ secrets.DEV_SITE_URL }}"
          else
            echo "⚠️  Site returned status $STATUS — may still be deploying."
          fi

      - name: Deployment summary
        run: |
          echo "┌─────────────────────────────────────────┐"
          echo "│  DEVELOPMENT Deployment Complete         │"
          echo "│  Branch:  develop                        │"
          echo "│  Commit:  ${{ github.sha }}              │"
          echo "│  URL:     ${{ secrets.DEV_SITE_URL }}    │"
          echo "└─────────────────────────────────────────┘"
