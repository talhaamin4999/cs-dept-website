# ──────────────────────────────────────────────────────────────
# CI Pipeline — HTML/CSS Linting + Docker Image Build
# Triggers: push or PR to any of the three main branches
# ──────────────────────────────────────────────────────────────

name: CI — Lint & Docker Build

on:
  push:
    branches: [develop, release, main]
  pull_request:
    branches: [develop, release, main]

jobs:
  # ── Job 1: HTML Linting ──────────────────────────────────────
  lint-html:
    name: Lint HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTMLHint on all pages
        run: htmlhint "src/**/*.html"

  # ── Job 2: CSS Linting ───────────────────────────────────────
  lint-css:
    name: Lint CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Run Stylelint on all CSS files
        run: stylelint "src/**/*.css"

  # ── Job 3: Docker Image Build ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push — CI only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cs-dept-website:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report success
        run: echo "✅ Docker image built successfully for commit ${{ github.sha }}"
